[build]
builder = "nixpacks"

[deploy]
startCommand = "node backend/src/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "backend"
source = "backend"

[[services]]
name = "frontend"
source = "frontend"
